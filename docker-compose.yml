version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: cryptoledger_app
    container_name: cryptoledger_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - C:/Users/User/.ssh:/home/www-data/.ssh:ro
    depends_on:
      - db

  web:
    image: nginx:latest
    container_name: cryptoledger_web
    restart: unless-stopped
    ports:
      - 8080:80
    volumes:
      - ./:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: cryptoledger_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: cryptoledger
      MYSQL_USER: ledger
      MYSQL_PASSWORD: secret
    ports:
      - 3306:3306
    volumes:
      - db_data:/var/lib/mysql

  adminer:
    image: adminer:latest
    container_name: cryptoledger_adminer
    restart: unless-stopped
    ports:
      - 8081:8080
volumes:
  db_data:
